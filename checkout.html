<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Alpha Male Wine Store</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

    <header>

        <div class="logo">
            🍷
            <h1>Alpha Male Wine Store</h1>
            <p>Premium Wines, Premium Experience</p>
        </div>

    </header>

    <nav>

        <a href="../index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html">
            🛒 Cart (<span id="cart-count">0</span>)
        </a>

    </nav>

    <section class="checkout">

        <h2>Checkout</h2>

        <form>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter your phone number" required>

            <label>Email Address</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Delivery Address</label>
            <textarea rows="4" placeholder="Enter your delivery address" required></textarea>

            <label>Delivery Method</label>
            <select required>
                <option>Select Delivery Method</option>
                <option>Pickup</option>
                <option>Home Delivery</option>
                <option>Nationwide Delivery</option>
            </select>

            <label>Payment Method</label>
            <select required>
                <option>Select Payment Method</option>
                <option>Cash</option>
                <option>Bank Transfer</option>
            </select>

            <button type="submit">
                Place Order
            </button>

        </form>

    </section>

    <footer>

        <p>© 2026 Alpha Male Wine Store</p>

    </footer>
    <a href="https://wa.me/2348076542317?text=Hello%20Alpha%20Male%20Wine%20Store!%20I%20would%20like%20to%20place%20an%20order."
   class="whatsapp-button"
   target="_blank">
    💬 WhatsApp Us
</a>
       class="whatsapp-button"
       target="_blank">

        💬 WhatsApp Us

    </a>

    <script src="../js/script.js"></script>

</body>
</html>
